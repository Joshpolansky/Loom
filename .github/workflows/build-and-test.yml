name: Build And Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CONAN_HOME: ${{ github.workspace }}/.conan2
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/workflows/build-and-test.yml

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py', 'conan/profiles/debug', 'sdk/conanfile.py', 'runtime/conanfile.py', 'VERSION') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: conan install . --output-folder=build/Debug --build=missing --profile=conan/profiles/debug

      - name: Configure CMake
        run: cmake --preset conan-debug

      - name: Build
        run: cmake --build --preset conan-debug

      - name: Test
        run: ctest --preset conan-debug --output-on-failure