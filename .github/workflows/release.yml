name: Release

# Push a tag like v0.1.0 to cut a release. The matrix below builds Loom
# in Release mode on each platform, packages the binary + example
# modules into a tarball named loom-<platform>-<arch>.tar.gz (which
# matches LoomUI's default release-asset template), and attaches them
# to the GitHub release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to use for the release (e.g. v0.1.0). The tag must already exist.'
        required: true

jobs:
  build:
    name: Build (${{ matrix.platform_name }})
    runs-on: ${{ matrix.os }}
    env:
      CONAN_HOME: ${{ github.workspace }}/.conan2
      ASSET_BASENAME: loom-${{ matrix.platform_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon runners are now default
            platform_name: darwin-arm64
          - os: ubuntu-latest
            platform_name: linux-x64
          - os: windows-latest
            platform_name: win32-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/workflows/release.yml

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ matrix.platform_name }}-conan-release-${{ hashFiles('conanfile.py', 'conan/profiles/release', 'sdk/conanfile.py', 'runtime/conanfile.py', 'VERSION') }}
          restore-keys: |
            ${{ matrix.platform_name }}-conan-release-

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies (Release)
        run: conan install . --output-folder=build/Release --build=missing --profile=conan/profiles/release

      - name: Configure CMake (Release)
        run: cmake --preset conan-release

      - name: Build (Release)
        run: cmake --build --preset conan-release

      - name: CMake install (SDK headers + cmake config) into staging prefix
        shell: bash
        run: |
          set -euo pipefail
          rm -rf install
          cmake --install build/Release --prefix install

      - name: Bundle glaze headers from Conan cache
        shell: bash
        run: |
          set -euo pipefail
          # Glaze is a header-only Conan dep. Locate its include dir in the
          # Conan cache so we can ship it alongside the loom SDK headers,
          # making the install self-contained for module developers.
          GLAZE_HPP=$(find "$CONAN_HOME" -type f -path '*/include/glaze/glaze.hpp' 2>/dev/null | head -n 1)
          if [ -z "$GLAZE_HPP" ]; then
            echo "::error::could not locate glaze headers in Conan cache" >&2
            find "$CONAN_HOME" -type d -name glaze 2>/dev/null | head || true
            exit 1
          fi
          GLAZE_INC_ROOT=$(dirname "$(dirname "$GLAZE_HPP")")
          echo "found glaze include root: $GLAZE_INC_ROOT"
          mkdir -p install/include
          cp -r "$GLAZE_INC_ROOT/glaze" install/include/

      - name: Stage release artifacts
        shell: bash
        run: |
          set -euo pipefail
          STAGE="dist/${ASSET_BASENAME}"
          mkdir -p "${STAGE}/modules"

          # Binary: CMakeLists installs to install/bin/. The build also
          # leaves it under output/ — prefer the install one since it's
          # the canonical install path.
          if [ -f "install/bin/loom" ]; then
            cp "install/bin/loom" "${STAGE}/loom"
          elif [ -f "install/bin/loom.exe" ]; then
            cp "install/bin/loom.exe" "${STAGE}/loom.exe"
          elif [ -f "output/loom" ]; then
            cp "output/loom" "${STAGE}/loom"
          elif [ -f "output/loom.exe" ]; then
            cp "output/loom.exe" "${STAGE}/loom.exe"
          else
            echo "::error::Loom binary not produced by build" >&2
            ls -la install/bin output/ 2>/dev/null || true
            exit 1
          fi

          # Module plugins live under output/modules/ — there are no install
          # rules for them since they're loaded at runtime via dlopen.
          if [ -d output/modules ]; then
            shopt -s nullglob
            for mod in output/modules/*.so output/modules/*.dylib output/modules/*.dll; do
              cp "$mod" "${STAGE}/modules/"
            done
          fi

          # SDK headers + cmake config + bundled glaze headers, so module
          # developers can `find_package(loom CONFIG REQUIRED)` against the
          # extracted tarball without needing Conan or a separate glaze
          # install.
          if [ -d install/include ]; then
            cp -r install/include "${STAGE}/include"
          fi
          if [ -d install/lib ]; then
            cp -r install/lib "${STAGE}/lib"
          fi

          # Drop in companion files so a tarball is informative on its own.
          for f in README.md LICENSE VERSION CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "${STAGE}/" || true
          done

          tar -czf "dist/${ASSET_BASENAME}.tar.gz" -C dist "${ASSET_BASENAME}"
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: dist/${{ env.ASSET_BASENAME }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show staged assets
        run: ls -lh dist/

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/loom-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
