name: Release

# Push a tag like v0.1.0 to cut a release. The actual build is done by the
# reusable build.yml workflow (shared with dev-build.yml so stable and dev
# builds are identical). A tag containing a hyphen (e.g. v0.2.0-rc.1) is
# published as a prerelease, so GitHub's "latest" — and the LoomUI extension's
# default install path — keeps tracking the newest stable version.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to use for the release (e.g. v0.1.0). The tag must already exist.'
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ github.event.inputs.tag || github.ref }}

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show staged assets
        run: ls -lh dist/

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          # A hyphenated semver tag (v1.2.0-rc.1, v1.2.0-dev.3, …) is a
          # prerelease; GitHub then keeps /releases/latest pointing at the
          # newest stable tag.
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          files: dist/loom-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
